<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-weight: bold;
            background-image: url("{{ url_for('static', filename='images/dog_name.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            display: flex;
            gap: 80px; /* space between left and right */
            width: 900px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .box {
            background-color: lch(43.22% 0.61 290.33 / 0.532);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(109, 108, 108, 0.5);
            flex: 1; /* equal width */
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }

        h3 {
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }

        label, select, input {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            font-size: 18px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        select {
            cursor: pointer;
        }

        button {
            background-color: #15cc79;
            color: black;
            padding: 15px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #12b66a;
        }

        /* Responsive: stack on small screens */
        @media (max-width: 1000px) {
            .form-container {
                flex-direction: column;
                width: 90%;
            }
        }
    </style>
</head>
