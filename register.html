<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
/* Full page background */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    background-image: url("{{ url_for('static', filename='images/g.jpg') }}");
    background-size: cover;
    background-position: right center; /* shift image slightly */
    background-repeat: no-repeat;
    height: 100vh;
    display: flex;
    justify-content: flex-start; /* move box to left */
    align-items: center;
    padding-left: 80px; /* space from left */
    color: white;
}

/* Glass Blur Form Container */
.form-container {
    background: rgba(255, 255, 255, 0.08); /* transparent glass */
    backdrop-filter: blur(8px); /* blur effect */
    -webkit-backdrop-filter: blur(8px);
    padding: 50px;
    border-radius: 20px;
    width: 450px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* Title */
h2 {
    font-size: 32px;
    margin-bottom: 25px;
}

/* Inputs */
input {
    width: 100%;
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 16px;
    outline: none;
}

input::placeholder {
    color: #eee;
}

input:focus {
    border: 1px solid white;
    background: rgba(255,255,255,0.3);
}

/* Glass Button */
button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: rgba(255,255,255,0.4);
    transform: translateY(-3px);
}

/* Links */
a {
    color: #ffffff;
    text-decoration: underline;
    font-weight: bold;
}

a:hover {
    color: #00ffff;
}

/* Flash Messages */
.error {
    color: #ff4d4d;
    margin-bottom: 10px;
}

.success {
    color: #00ff99;
    margin-bottom: 10px;
}

/* Responsive */
@media(max-width: 768px) {
    body {
        justify-content: center;
        padding-left: 0;
        background-position: center;
    }

    .form-container {
        width: 90%;
    }
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Register</h2>

    <form method="POST" action="/register">
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="contact" placeholder="Contact No" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="text" name="address" placeholder="Address" required>
        <button type="submit">Register</button>
    </form>

    <p>Already have an account? 
        <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>

</body>
</html>
